version: "3.4"

services:
  postgres:
    image: postgres:latest
    container_name: limbus-postgres
    ports:
      - "9000:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - E:/Docker/limbus-postgres-data:/var/lib/postgresql/18/data #Change your folder here
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: limbus-pgadmin
    ports:
      - "5050:80"
    env_file:
      - .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    depends_on:
      - postgres
    restart: unless-stopped